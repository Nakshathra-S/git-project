<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form>

<fieldset>
<legend>Personal Information</legend>

Name:
<input type="text"><br><br>

Gender:
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female

</fieldset>

<br>

<fieldset>
<legend>Course Details</legend>

Select Course:
<select>
    <option>CSE</option>
    <option>IT</option>
    <option>ECE</option>
    <option>EEE</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Other Details</legend>

Facilities Required:<br>

<input type="checkbox"> Hostel<br>
<input type="checkbox"> Transport<br>
<input type="checkbox"> Scholarship

<br><br>

Comments:<br>
<textarea rows="4" cols="30"></textarea>

</fieldset>

<br>

<input type="submit" value="Submit">

</form>

</body>
</html>
